name: SkyWatch Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jacobbeningo/skywatch-ci:latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - frdm_mcxn947/mcxn947/cpu0
          - native_sim/native/64
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: skywatch

      - name: Initialize Zephyr workspace
        run: |
          west init -l skywatch
          west update
          west zephyr-export

      - name: Install Zephyr Python requirements
        run: pip3 install -r zephyr/scripts/requirements.txt --break-system-packages -q

      - name: Build application
        run: |
          west build -b ${{ matrix.board }} skywatch -d build/${{ matrix.board }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: matrix.board == 'frdm_mcxn947/mcxn947/cpu0'
        with:
          name: firmware-frdm_mcxn947
          path: |
            build/${{ matrix.board }}/zephyr/zephyr.bin
            build/${{ matrix.board }}/zephyr/zephyr.elf
          retention-days: 30

  test:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jacobbeningo/skywatch-ci:latest
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: skywatch
  
      - name: Initialize Zephyr workspace
        run: |
          west init -l skywatch
          west update
          west zephyr-export
  
      - name: Install Zephyr Python requirements
        run: pip3 install -r zephyr/scripts/requirements.txt --break-system-packages -q
      - name: Run Twister tests
        run: |
          west twister \
            -T skywatch/tests/ \
            -p native_sim/native/64 \
            --inline-logs \
            --report-dir skywatch/test-results
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: skywatch/test-results/
          retention-days: 30
  
  static-analysis:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format
    
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I src/ \
            src/
  
      - name: Check code formatting
        run: |
            find src/ -name "*.c" -o -name "*.h" | \
              xargs clang-format --dry-run --Werror
